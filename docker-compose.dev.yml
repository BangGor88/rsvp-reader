services:
  frontend:
    build:
      context: ./frontend
      target: dev
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:5173"

  backend:
    build: ./backend
    user: "0:0"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - pdf_uploads:/app/uploads

volumes:
  pdf_uploads:
